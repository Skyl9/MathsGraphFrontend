server {
  listen 8080;

  root /usr/share/nginx/html;
  index index.html;

  # ─── env-config.js : JAMAIS caché (généré au runtime par env.sh) ────────────
  # Cette règle DOIT être avant la règle des assets statiques pour prendre
  # priorité sur le pattern *.js
  location = /env-config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Pragma "no-cache";
    expires -1;
  }

  # ─── Assets hashés par Vite (JS, CSS, fonts) → cache long terme ─────────────
  # Sécurité : Vite ajoute un hash de contenu dans le nom de fichier
  # (ex: index-Dg3k9f.js), donc un nouveau build = un nouveau fichier.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # ─── Favicon et autres fichiers statiques racine ────────────────────────────
  location ~* \.(ico|svg|png|jpg|gif|webp|woff2?|ttf|eot)$ {
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  # ─── SPA fallback : toutes les routes servent index.html sans cache ─────────
  # Ceci couvre /, /graph, /login, /concept/123, etc.
  # Le no-store garantit que chaque navigation charge le HTML frais
  # avec les bons liens vers les assets hashés du dernier build.
  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Pragma "no-cache";
    expires -1;
    try_files $uri /index.html;
  }
}
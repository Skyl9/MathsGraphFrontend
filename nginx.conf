server {
  listen 8080;

  root /usr/share/nginx/html;
  index index.html;

  # ─── Ne JAMAIS mettre en cache index.html ───────────────────────────────────
  location = /index.html {
    add_header Cache-Control no-store;
    add_header Pragma no-cache;
    expires -1;
    try_files $uri /index.html;
  }

  # ─── Assets hashés par Vite (JS, CSS, fonts) → cache long terme ─────────────
  location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|gif|webp)$ {
    add_header Cache-Control public;
    expires 1y;
    add_header Pragma "";
    try_files $uri =404;
  }

  # ─── Toutes les autres routes → SPA fallback ─────────────────────────────────
  location / {
    try_files $uri /index.html;
  }
}
server {
  listen 8080;

  root /usr/share/nginx/html;
  index index.html;

  # ─── env-config.js : JAMAIS caché (généré au runtime par env.sh) ────────────
  # Cette règle DOIT être avant la règle des assets statiques pour prendre
  # priorité sur le pattern *.js
  location = /env-config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Pragma "no-cache";
    expires -1;
  }

  # ─── Assets hashés par Vite (JS, CSS, fonts) → cache long terme ─────────────
  # Sécurité : Vite ajoute un hash de contenu dans le nom de fichier
  # (ex: index-Dg3k9f.js), donc un nouveau build = un nouveau fichier.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # ─── Favicon et autres fichiers statiques racine ────────────────────────────
  location ~* \.(ico|svg|png|jpg|gif|webp|woff2?|ttf|eot)$ {
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  # ─── SPA fallback : toutes les routes servent index.html sans cache ─────────
  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Pragma "no-cache";
    expires -1;
    try_files $uri @prerender;
  }

  location @prerender {
    set $prerender 0;
    if ($http_user_agent ~* "googlebot|bingbot|yandex|baiduspider|twitterbot|facebookexternalhit|rogerbot|linkedinbot|embedly|quora link preview|showyoubot|outbrain|pinterest\/0\.|pinterestbot|slackbot|vkShare|W3C_Validator|whatsapp|discordbot") {
        set $prerender 1;
    }
    if ($args ~ "_escaped_fragment_") {
        set $prerender 1;
    }
    if ($http_user_agent ~ "Prerender") {
        set $prerender 0;
    }
    
    # Résolution DNS pour service.prerender.io
    resolver 8.8.8.8 8.8.4.4;

    if ($prerender = 1) {
        # Remplacer 'YOUR_TOKEN' par le vrai token Prerender.io en production
        # proxy_set_header X-Prerender-Token YOUR_TOKEN;
        rewrite .* /$scheme://$host$request_uri? break;
        proxy_pass https://service.prerender.io;
    }
    if ($prerender = 0) {
        rewrite .* /index.html break;
    }
  }
}